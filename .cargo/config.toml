# Cargo Build Configuration
# This file optimizes build performance and reduces disk space usage

[build]
# Parallel jobs - use all CPU cores for maximum speed
jobs = 12              # Reduced from 14 to leave resources for system (adjust if needed)
incremental = true     # Enable incremental compilation

# Optimize for faster compilation during development
[target.'cfg(all())']
# Use mold linker for MUCH faster linking (10x+ faster than ld64)
# Install: brew install mold
# Uncomment after installing mold:
# rustflags = ["-C", "link-arg=-fuse-ld=/opt/homebrew/bin/mold"]

# Alternative: Use zld (faster than ld64, slower than mold)
# Install: brew install michaeleisel/zld/zld
# Uncomment after installing zld:
# rustflags = ["-C", "link-arg=-fuse-ld=/opt/homebrew/bin/zld"]

# Universal fallback for all platforms (including FreeBSD)
rustflags = [
    "--cfg", "tokio_unstable",          # Enable Tokio RuntimeMetrics
]

# macOS-specific optimizations
[target.x86_64-apple-darwin]
# tokio_unstable is inherited from [target.'cfg(all())']; only add x86-specific flags here.
rustflags = [
    "-C", "split-debuginfo=unpacked",
    "-C", "link-arg=-Wl,-dead_strip",  # Remove dead code at link time
]

[target.aarch64-apple-darwin]
# Note: split-debuginfo=unpacked, -dead_strip, and tokio_unstable are omitted here.
# aws-lc-sys encodes CARGO_ENCODED_RUSTFLAGS into its C compiler invocation
# during the memcmp bug-check; unknown flags cause the check to fail.
# tokio_unstable is already set in [target.'cfg(all())'] above and must not be
# duplicated here — the two sections are merged and the combined string is passed
# verbatim to the C compiler, breaking aws-lc-sys detection.
rustflags = []

# Linux-specific optimizations (for CI)
[target.x86_64-unknown-linux-gnu]
# Use lld linker for much faster linking (2-5x faster than ld)
linker = "clang"
rustflags = [
    "-C", "link-arg=-fuse-ld=lld",
    "--cfg", "tokio_unstable",          # Enable Tokio RuntimeMetrics
]

[target.aarch64-unknown-linux-gnu]
rustflags = [
    "--cfg", "tokio_unstable",          # Enable Tokio RuntimeMetrics
]

# Network settings
[net]
# Use git CLI for better performance with large repositories
git-fetch-with-cli = true

# Registry settings
[registry]
# Use sparse registry protocol for faster index updates (Rust 1.68+)
default = "sparse"

# Term settings - better progress output
[term]
verbose = false
color = 'auto'
progress.when = 'auto'
progress.width = 80

# Future incompatibility warnings
[future-incompat-report]
frequency = 'never'  # Don't generate reports (reduces disk I/O)

# Test execution settings
[env]
# Use cmake builder for aws-lc-sys to bypass the cc-based memcmp compiler bug
# detection which incorrectly fails on Apple Clang 17 when CARGO_ENCODED_RUSTFLAGS
# contains --cfg flags that clang doesn't understand as C compiler arguments.
AWS_LC_SYS_CMAKE_BUILDER = "1"
# Set test threads based on CPU cores (can be overridden per test)
RUST_TEST_THREADS = "14"
# Reduce test output verbosity
RUST_TEST_NOCAPTURE = "0"
# Use faster allocator for tests (if available)
# CARGO_PROFILE_TEST_OPT_LEVEL = "0"

# Source replacement (optional - uncomment if using mirrors)
# [source.crates-io]
# replace-with = "ustc"
# 
# [source.ustc]
# registry = "sparse+https://mirrors.ustc.edu.cn/crates.io-index/"

