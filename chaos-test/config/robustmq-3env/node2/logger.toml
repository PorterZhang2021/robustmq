[stdout]
kind = "console"
targets = [
    { path = "", level = "info" },
    { path = "openraft", level = "info" },
]

[server]
kind = "rolling_file"
targets = [
    { path = "", level = "info" },
    { path = "openraft", level = "info" },
]
rotation = "daily"
directory = "./data/broker-2/logs"
prefix = "server"
suffix = "log"
max_log_files = 50

[http_request]
kind = "rolling_file"
targets = [{ path = "admin_server::server", level = "info" }]
rotation = "daily"
directory = "./data/broker-2/logs"
prefix = "http_request"
suffix = "log"
max_log_files = 50

[raft]
kind = "rolling_file"
targets = [
    { path = "openraft", level = "info" },
    { path = "openraft::raft::responder", level = "error" },
]
rotation = "daily"
directory = "./data/broker-2/logs"
prefix = "raft"
suffix = "log"
max_log_files = 50

[tokio_console]
grpc_web = true
kind = "tokio_console"
bind = "127.0.0.1:5675"

[meta]
kind = "rolling_file"
targets = [{ path = "meta_service", level = "info" }]
rotation = "daily"
directory = "./data/broker-2/logs"
prefix = "meta"
suffix = "log"
max_log_files = 50

[openraft_except_engine]
kind = "rolling_file"
targets = [
    { path = "openraft", level = "info" },
    { path = "openraft::engine", level = "off" },
    { path = "openraft::raft::responder", level = "error" },
]
rotation = "daily"
directory = "./data/broker-2/logs"
prefix = "openraft-except-engine"
suffix = "log"
max_log_files = 10
