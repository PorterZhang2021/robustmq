cluster_name = "robustmq-cluster"
broker_id = 3
broker_ip = "127.0.0.1"
roles = ["meta", "broker", "engine"]
grpc_port = 3228
http_port = 8083
meta_addrs = { 1 = "127.0.0.1:1228", 2 = "127.0.0.1:2228", 3 = "127.0.0.1:3228" }

[rocksdb]
data_path = "./data/broker-3/data"
max_open_files = 10000

[log]
log_config = "./config/logger.toml"
log_path = "./data/broker-3/logs"

[network]
accept_thread_num = 1
handler_thread_num = 64
queue_size = 5000
keep_alive_enable = false

[meta_runtime]
heartbeat_timeout_ms = 30000
heartbeat_check_time_ms = 1000
raft_write_timeout_sec = 30
offset_raft_group_num = 1
data_raft_group_num = 1

[mqtt_keep_alive]
enable = true
default_time = 180
max_time = 3600
default_timeout = 2

[message_storage]
storage_type = "EngineRocksDB"

[mqtt_system_topic]
interval_ms = 60000

[mqtt_offline_message]
enable = true
expire_ms = 3600000
max_messages_num = 100000

[storage_offset]
enable_cache = true

[storage_runtime]
tcp_port = 3779
max_segment_size = 1073741824
data_path = ["./data/broker-3/engine"]
io_thread_num = 4

[runtime]
tls_cert = "./config/certs/cert.pem"
tls_key = "./config/certs/key.pem"
server_worker_threads = 16
meta_worker_threads = 16
broker_worker_threads = 16

[mqtt_runtime]
default_user = "admin"
default_password = "robustmq"
durable_sessions_enable = false
secret_free_login = false
is_self_protection_status = false

[grpc_client]
channels_per_address = 4

[mqtt_server]
tcp_port = 3883
tls_port = 3885
websocket_port = 8383
websockets_port = 8385
quic_port = 9383

[nats_runtime]
tcp_port = 6222
tls_port = 6223
ws_port  = 6080
wss_port = 6443

[kafka_runtime]
tcp_port = 9292

[amqp_runtime]
tcp_port = 5872
