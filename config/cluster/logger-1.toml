[stdout]
kind = "console"
targets = [
    { path = "", level = "info" },
    { path = "openraft", level = "debug" },
]

[server]
kind = "rolling_file"
targets = [
    { path = "", level = "info" },
    { path = "openraft", level = "info" },
]
rotation = "daily"
directory = "./data/broker-1/logs"
prefix = "server"
suffix = "log"
max_log_files = 50

[http_request]
kind = "rolling_file"
targets = [{ path = "admin_server::server", level = "info" }]
rotation = "daily"
directory = "./data/broker-1/logs"
prefix = "http_request"
suffix = "log"
max_log_files = 50

[raft]
kind = "rolling_file"
targets = [
    { path = "openraft", level = "info" },
    { path = "openraft::raft::responder", level = "error" },
]
rotation = "daily"
directory = "./data/broker-1/logs"
prefix = "raft"
suffix = "log"
max_log_files = 50

# tokio-console instrumentation: disabled by default. Its aggregator tracks every
# task/async-op/resource and burns a full CPU core (HashMap::retain + sip-hash over a
# growing set) under sustained load, starving the runtime. Enable only for debugging.
# [tokio_console]
# grpc_web = true
# kind = "tokio_console"
# bind = "127.0.0.1:5674"

[meta]
kind = "rolling_file"
targets = [{ path = "meta_service", level = "info" }]
rotation = "daily"
directory = "./data/broker-1/logs"
prefix = "meta"
suffix = "log"
max_log_files = 50

[openraft_except_engine]
kind = "rolling_file"
targets = [
    { path = "openraft", level = "info" },
    { path = "openraft::engine", level = "off" },
    { path = "openraft::raft::responder", level = "error" },
]
rotation = "daily"
directory = "./data/broker-1/logs"
prefix = "openraft-except-engine"
suffix = "log"
max_log_files = 10
