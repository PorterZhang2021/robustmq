name: Issue PR Labeler

on:
  issues:
    types: [opened, reopened, edited]
  pull_request_target:
    types: [opened, reopened, edited]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Apply labels by title
        uses: actions/github-script@v7
        with:
          script: |
            const isPR = !!context.payload.pull_request;
            const isIssue = !!context.payload.issue;
            const title = isPR
              ? context.payload.pull_request.title
              : context.payload.issue.title;
            const number = isPR
              ? context.payload.pull_request.number
              : context.payload.issue.number;

            const prRules = [
              { label: 'kind:feat',     regex: /^feat(\(.*\))?:/i },
              { label: 'kind:bug',      regex: /^fix(\(.*\))?:/i },
              { label: 'kind:test',     regex: /^test(\(.*\))?:/i },
              { label: 'kind:refactor', regex: /^refactor(\(.*\))?:/i },
              { label: 'kind:chore',    regex: /^chore(\(.*\))?:/i },
              { label: 'kind:style',    regex: /^style(\(.*\))?:/i },
              { label: 'kind:docs',     regex: /^docs(\(.*\))?:/i },
              { label: 'kind:perf',     regex: /^perf(\(.*\))?:/i },
              { label: 'kind:build',    regex: /^build(\(.*\))?:/i },
              { label: 'kind:ci',       regex: /^ci(\(.*\))?:/i },
              { label: 'kind:revert',   regex: /^revert(\(.*\))?:/i },
            ];

            const issueRules = [
              { label: 'kind:style',    regex: /^\[(RBIP-\d+|MINOR)\]\[Style\]\[Subtask\]|^\[Style\]/i },
              { label: 'kind:refactor', regex: /^\[(RBIP-\d+|MINOR)\]\[Refactor\]\[Subtask\]|^\[Refactor\]/i },
              { label: 'kind:perf',     regex: /^\[(RBIP-\d+|MINOR)\]\[Performance\]\[Subtask\]|^\[Performance\]/i },
              { label: 'kind:docs',     regex: /^\[(RBIP-\d+|MINOR)\]\[Docs\]\[Subtask\]|^\[Docs\]/i },
              { label: 'kind:test',     regex: /^\[(RBIP-\d+|MINOR)\]\[Test\]\[Subtask\]|^\[Test\]/i },
              { label: 'kind:build',    regex: /^\[(RBIP-\d+|MINOR)\]\[Build\]\[Subtask\]|^\[Build\]/i },
              { label: 'kind:ci',       regex: /^\[(RBIP-\d+|MINOR)\]\[CI\]\[Subtask\]|^\[CI\]/i },
              { label: 'kind:chore',    regex: /^\[(RBIP-\d+|MINOR)\]\[Chore\]\[Subtask\]|^\[Chore\]/i },
              { label: 'kind:subtask',  regex: /^\[(RBIP-\d+|MINOR)\].*\[Subtask\]/i },
              { label: 'enhancement',   regex: /^\[(Style|Refactor|Performance|Docs|Test|Build|CI|Chore)\]/i },
              { label: 'kind:bug',      regex: /^\[BUG\]/i },
              { label: 'kind:feat',     regex: /^\[Feat\]/i },
              { label: 'kind:umbrella', regex: /^\[(RBIP-\d+|MINOR)\](?!.*\[Subtask\])/i },
            ];

            const rules = isPR ? prRules : issueRules;
            const labelsToAdd = rules
              .filter(r => r.regex.test(title))
              .map(r => r.label);

            if (labelsToAdd.length === 0) return;

            const addLabel = isPR
              ? github.rest.issues.addLabels
              : github.rest.issues.addLabels;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              labels: labelsToAdd,
            });

            console.log(`Applied labels: ${labelsToAdd.join(', ')} to #${number}`);
